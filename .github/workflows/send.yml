name: Send Training Poll

on:
  schedule:
    - cron: '12 12 * * 0'  # Воскресенье 15:00 МСК (12:00 UTC)
    - cron: '12 12 * * 2'  # Вторник 15:00 МСК
    - cron: '12 12 * * 4'  # Четверг 15:00 МСК
  workflow_dispatch:

jobs:
  send-poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install python-telegram-bot
      - run: python poll.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
